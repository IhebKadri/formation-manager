services:
  db:
    image: postgres:15-alpine
    container_name: formation-db
    environment:
      POSTGRES_DB: formation_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: formation-backend
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/formation_db
      - DB_USERNAME=user
      - DB_PASSWORD=password
      - JWT_SECRET=myawesomeandsecurejwtsecretthatislongenough
      - JWT_ACCESS_EXPIRATION=3600000
      - JWT_REFRESH_EXPIRATION=86400000
      - SERVER_PORT=8080
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: formation-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080/api
    depends_on:
      - backend

volumes:
  postgres_data:
