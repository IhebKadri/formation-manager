services:
  db:
    image: postgres:15-alpine
    container_name: formation-db
    environment:
      POSTGRES_DB: formation_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d formation_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: formation-backend
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/formation_db
      - DB_USERNAME=user
      - DB_PASSWORD=password
      - JWT_SECRET=myawesomeandsecurejwtsecretthatislongenough
      - JWT_ACCESS_EXPIRATION=3600000
      - JWT_REFRESH_EXPIRATION=86400000
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=dev
    volumes:
      - ./backend/src:/app/src # live source watching
      - ./backend/pom.xml:/app/pom.xml # dependency changes
      - maven-cache:/root/.m2 # cached dependencies
    depends_on:
      db:
        condition: service_healthy # waits for postgres to be ready

volumes:
  postgres_data:
  maven-cache:
