spring.application.name=formation-backend

# Server
server.port=${SERVER_PORT:8080}
server.max-http-request-header-size=64KB

# PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION}
app.jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION}

# CORS
app.cors.allowed-origins=http://localhost:5173

# DevTools (redémarrage automatique + LiveReload)
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Logs
logging.level.org.springframework.web=DEBUG

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true